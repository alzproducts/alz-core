# Codecov configuration
# https://docs.codecov.com/docs/codecov-yaml
#
# Strategy aligned with tests/TestingStrategy.md:
# - Domain: 90%+ coverage, strict mutation testing
# - Application: 70%+ coverage, mutation testing for services
# - Infrastructure/Presentation: No coverage targets (integration/smoke tests only)

coverage:
  status:
    project:
      default: false  # Disable overall project check - we use layer-specific checks
      domain:
        target: 90%
        paths:
          - app/Domain/**
      application:
        target: 70%
        paths:
          - app/Application/**
    patch: off  # Disable patch coverage - too volatile for small changes

# Ignore paths that should never trigger coverage failures
# Aligned with tests/TestingStrategy.md exclusions
ignore:
  - "app/DevTools/**"
  - "app/Providers/**"
  - "**/*Exception.php"
  - "**/*Factory.php"
  - "**/Contracts/**"  # Interfaces have no implementation to test
  # Domain Events are data carriers with no logic (TestingStrategy.md)
  - "**/*Event.php"
  # Pure delegation UseCases (no branching logic worth testing)
  - "app/Application/Shopwired/UseCases/SyncAllCustomersUseCase.php"
  - "app/Application/ContactSubmission/UseCases/SubmitContactFormUseCase.php"
  # Simple result value objects - minimal logic
  - "app/Application/ContactSubmission/Results/SubmitContactFormResult.php"

# Components show coverage by code area in Codecov dashboard
# See: https://docs.codecov.com/docs/components
component_management:
  individual_components:
    - component_id: domain
      name: Domain Layer
      paths:
        - app/Domain/**
    - component_id: application
      name: Application Layer
      paths:
        - app/Application/**
    - component_id: infrastructure
      name: Infrastructure Layer
      paths:
        - app/Infrastructure/**
    - component_id: presentation
      name: Presentation Layer
      paths:
        - app/Presentation/**
        - app/Http/**
        - app/Console/**

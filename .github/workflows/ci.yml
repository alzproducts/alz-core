name: Laravel 12 CI Pipeline

on:
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  PHP_VERSION: '8.4'
  COMPOSER_NO_INTERACTION: 1

permissions:
  contents: read
  pull-requests: read

jobs:
  # Detect what changed — skips expensive jobs for docs-only PRs
  changes:
    name: Detect Changes
    runs-on: ubuntu-24.04
    permissions:
      pull-requests: read
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - 'app/**'
              - 'config/**'
              - 'database/**'
              - 'routes/**'
              - 'tests/**'
              - 'composer.json'
              - 'composer.lock'
              - 'phpstan.neon'
              - 'phpunit.xml'
              - 'phpunit-*.xml'
              - 'pint.json'
              - 'psalm.xml'
              - 'deptrac.yaml'
              - 'phparkitect.php'
              - '.github/workflows/**'

  # Fast feedback: Code style + static analysis (runs PHPStan, Pint, PHPArkitect, Deptrac, TLint)
  code-style:
    name: Lint & Static Analysis
    runs-on: ubuntu-24.04
    needs: changes
    if: needs.changes.outputs.code == 'true'
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup PHP ${{ env.PHP_VERSION }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, xml, ctype, json, soap
          coverage: none
          tools: composer:v2

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Cache PHPStan results
        uses: actions/cache@v4
        with:
          path: storage/framework/phpstan
          key: phpstan-${{ hashFiles('**/*.php') }}-${{ hashFiles('composer.lock') }}
          restore-keys: |
            phpstan-${{ hashFiles('**/*.php') }}-
            phpstan-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress --ignore-platform-req=ext-swoole

      - name: Run Laravel Pint
        run: composer run lint

  # Test suite without coverage (coverage enforced locally via make test-coverage / mutation testing)
  tests:
    name: Pest Tests + Coverage (PostgreSQL 17)
    runs-on: ubuntu-24.04
    needs: changes
    if: needs.changes.outputs.code == 'true'
    timeout-minutes: 20

    env:
      APP_ENV: testing
      APP_DEBUG: true
      DB_CONNECTION: pgsql
      DB_HOST: localhost
      DB_PORT: 5432
      DB_DATABASE: testing
      DB_USERNAME: postgres
      DB_PASSWORD: password
      DB_SSLMODE: disable
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      CACHE_DRIVER: redis
      QUEUE_CONNECTION: sync
      TELESCOPE_ENABLED: false

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: testing
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP ${{ env.PHP_VERSION }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, pdo_pgsql, pgsql, bcmath, soap, intl, gd, exif, iconv, redis
          ini-values: |
            memory_limit=512M
            zend.assertions=1
            opcache.enable_cli=1
          coverage: none
          tools: composer:v2

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress --ignore-platform-req=ext-swoole

      - name: Prepare Laravel application
        run: |
          cp .env.example .env
          php artisan key:generate
          chmod -R 775 storage bootstrap/cache

      - name: Run database migrations
        run: make migrate

      - name: Setup problem matchers for PHP
        run: echo "::add-matcher::${{ runner.tool_cache }}/phpunit.json"

      - name: Execute test suite
        run: composer run test

  # Security scanning (60-90 seconds)
  security:
    name: Security Audit & Dependency Scan
    runs-on: ubuntu-24.04
    needs: changes
    if: needs.changes.outputs.code == 'true'
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP ${{ env.PHP_VERSION }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          coverage: none

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress --ignore-platform-req=ext-swoole

      - name: Run Composer audit
        run: composer audit --format=json

  # Psalm Taint Analysis (60-90 seconds)
  taint-analysis:
    name: Psalm Taint Analysis (Security)
    runs-on: ubuntu-24.04
    needs: changes
    if: needs.changes.outputs.code == 'true'
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP ${{ env.PHP_VERSION }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          # Psalm requires: dom, simplexml, tokenizer (in addition to standard extensions)
          extensions: mbstring, xml, ctype, json, bcmath, soap, dom, simplexml, tokenizer
          coverage: none
          tools: composer:v2

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Cache Psalm results
        uses: actions/cache@v4
        with:
          path: storage/framework/psalm
          key: psalm-${{ hashFiles('**/*.php') }}-${{ hashFiles('composer.lock') }}
          restore-keys: |
            psalm-${{ hashFiles('**/*.php') }}-
            psalm-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress --ignore-platform-req=ext-swoole

      - name: Run Psalm taint analysis
        run: make psalm-ci

  # Layer-Specific Mutation Testing (see tests/TestingStrategy.md)
  # Only runs on PRs to main (develop->main promotion) - informational, non-blocking
  # Jobs run in parallel for faster feedback

  # Domain Layer: 90%+ MSI (strict) - pure business logic, highest value
  mutation-domain:
    name: Mutation Testing (Domain - 90%+ MSI)
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    if: github.base_ref == 'main'
    continue-on-error: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP ${{ env.PHP_VERSION }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, bcmath, soap, intl, gd, exif, iconv
          ini-values: |
            memory_limit=512M
            zend.assertions=1
          coverage: pcov
          tools: composer:v2

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress --ignore-platform-req=ext-swoole

      - name: Prepare Laravel application
        run: |
          cp .env.example .env
          php artisan key:generate
          chmod -R 775 storage bootstrap/cache

      - name: Run Pest Mutate on Domain Layer
        run: make mutate-domain

  # Application Layer: 70%+ mutation score - Uses Pest mutate (namespace-based filtering)
  mutation-application:
    name: Mutation Testing (Application - 70%+ Pest)
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    if: github.base_ref == 'main'
    continue-on-error: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP ${{ env.PHP_VERSION }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, bcmath, soap, intl, gd, exif, iconv
          ini-values: |
            memory_limit=512M
            zend.assertions=1
          coverage: pcov
          tools: composer:v2

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress --ignore-platform-req=ext-swoole

      - name: Prepare Laravel application
        run: |
          cp .env.example .env
          php artisan key:generate
          chmod -R 775 storage bootstrap/cache

      - name: Run Pest mutation testing on Application Layer
        run: make mutate-app

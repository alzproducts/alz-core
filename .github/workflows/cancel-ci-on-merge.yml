name: Cancel CI on Merge

on:
  pull_request:
    types: [closed]
    branches: [main, develop]

jobs:
  cancel:
    runs-on: ubuntu-24.04
    permissions:
      actions: write
    steps:
      - name: Cancel in-progress CI runs
        uses: styfle/cancel-workflow-action@0.13.1
        with:
          ignore_sha: true
          workflow_id: ci.yml

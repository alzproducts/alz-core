deptrac:
  paths:
    - app/

  # PHP built-ins (DateTime, Throwable) don't require explicit layers
  ignore_uncovered_internal_classes: true

  layers:
    # === Application Layers (Clean Architecture) ===
    - name: Domain
      collectors:
        - type: classLike
          value: ^App\\Domain\\.*

    - name: Application
      collectors:
        - type: classLike
          value: ^App\\Application\\.*

    - name: Infrastructure
      collectors:
        - type: classLike
          value: ^App\\Infrastructure\\.*

    - name: Presentation
      collectors:
        - type: classLike
          value: ^App\\Presentation\\.*

    # === External Package Layers (Whitelist) ===

    # Assertion library - pure validation
    - name: AssertionLibrary
      collectors:
        - type: classLike
          value: ^Webmozart\\Assert\\.*

    # PSR interfaces - framework-agnostic contracts
    - name: PsrInterfaces
      collectors:
        - type: classLike
          value: ^Psr\\.*

    # Laravel framework
    - name: LaravelFramework
      collectors:
        - type: classLike
          value: ^Illuminate\\.*

    # Spatie LaravelData - DTOs
    - name: SpatieData
      collectors:
        - type: classLike
          value: ^Spatie\\LaravelData\\.*

    # Google Ads SDK
    - name: GoogleAdsSdk
      collectors:
        - type: classLike
          value: ^Google\\.*

    # Bing Ads (Microsoft Advertising) SDK
    - name: BingAdsSdk
      collectors:
        - type: classLike
          value: ^Microsoft\\BingAds\\.*

    # HelpScout API SDK
    - name: HelpScoutSdk
      collectors:
        - type: classLike
          value: ^HelpScout\\.*

    # Guzzle HTTP (used by Laravel HTTP client for pool/promise types)
    - name: GuzzleHttp
      collectors:
        - type: classLike
          value: ^GuzzleHttp\\.*

    # Symfony HTTP Foundation
    - name: SymfonyHttp
      collectors:
        - type: classLike
          value: ^Symfony\\Component\\HttpFoundation\\.*

    # Symfony HTTP Kernel (exceptions, etc.)
    - name: SymfonyHttpKernel
      collectors:
        - type: classLike
          value: ^Symfony\\Component\\HttpKernel\\.*

    # Firebase JWT
    - name: FirebaseJwt
      collectors:
        - type: classLike
          value: ^Firebase\\JWT\\.*

    # League Flysystem (filesystem abstraction)
    - name: LeagueFlysystem
      collectors:
        - type: classLike
          value: ^League\\Flysystem\\.*

    # Sentry SDK (error monitoring)
    - name: SentrySdk
      collectors:
        - type: classLike
          value: ^Sentry\\.*

    # Carbon date/time library (Laravel dependency)
    - name: CarbonDateTime
      collectors:
        - type: classLike
          value: ^Carbon\\.*

    # Monolog logging library (Laravel dependency)
    - name: MonologLogging
      collectors:
        - type: classLike
          value: ^Monolog\\.*

  ruleset:
    # Domain: Pure business logic + assertions only
    Domain:
      - AssertionLibrary

    # Application: Domain + PSR interfaces
    Application:
      - Domain
      - PsrInterfaces

    # Infrastructure: All internal + Laravel, Spatie, Google, Bing, Guzzle, PSR, Flysystem, Assertions, Sentry, Symfony, Carbon, Monolog
    Infrastructure:
      - Application
      - Domain
      - LaravelFramework
      - SpatieData
      - GoogleAdsSdk
      - BingAdsSdk
      - HelpScoutSdk
      - GuzzleHttp
      - PsrInterfaces
      - LeagueFlysystem
      - AssertionLibrary
      - SentrySdk
      - SymfonyHttp
      - CarbonDateTime
      - MonologLogging

    # Presentation: Internal + Laravel, Symfony, Firebase, Sentry, Carbon
    Presentation:
      - Application
      - Domain
      - LaravelFramework
      - SymfonyHttp
      - SymfonyHttpKernel
      - FirebaseJwt
      - SentrySdk
      - CarbonDateTime

    # External layers have no outbound dependencies
    AssertionLibrary: ~
    PsrInterfaces: ~
    LaravelFramework: ~
    SpatieData: ~
    GoogleAdsSdk: ~
    BingAdsSdk: ~
    HelpScoutSdk: ~
    GuzzleHttp: ~
    SymfonyHttp: ~
    SymfonyHttpKernel: ~
    FirebaseJwt: ~
    LeagueFlysystem: ~
    SentrySdk: ~
    CarbonDateTime: ~
    MonologLogging: ~

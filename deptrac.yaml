deptrac:
  paths:
    - app/

  # PHP built-ins (DateTime, Throwable) don't require explicit layers
  ignore_uncovered_internal_classes: true

  layers:
    # === Application Layers (Clean Architecture) ===
    - name: Domain
      collectors:
        - type: classLike
          value: ^App\\Domain\\.*

    - name: Application
      collectors:
        - type: bool
          must:
            - type: classLike
              value: ^App\\Application\\.*
          must_not:
            - type: classLike
              value: ^App\\Application\\Jobs\\.*

    # Jobs need Illuminate\* + Carbon\* but Application must stay pure.
    # Sub-layer pattern (like PresentationDev) with explicit framework access.
    - name: ApplicationJobs
      collectors:
        - type: classLike
          value: ^App\\Application\\Jobs\\.*

    - name: Infrastructure
      collectors:
        - type: classLike
          value: ^App\\Infrastructure\\.*

    # Dev utilities can access Infrastructure for testing/debugging
    - name: PresentationDev
      collectors:
        - type: classLike
          value: ^App\\Presentation\\Console\\Commands\\Dev\\.*

    - name: Presentation
      collectors:
        - type: bool
          must:
            - type: classLike
              value: ^App\\Presentation\\.*
          must_not:
            - type: classLike
              value: ^App\\Presentation\\Console\\Commands\\Dev\\.*

    # === External Package Layers (Whitelist) ===

    # Assertion library - pure validation
    - name: AssertionLibrary
      collectors:
        - type: classLike
          value: ^Webmozart\\Assert\\.*

    # PSR interfaces - framework-agnostic contracts
    - name: PsrInterfaces
      collectors:
        - type: classLike
          value: ^Psr\\.*

    # Illuminate\Contracts\Events - stable event dispatcher contract (same allowance as PHPArkitect)
    - name: IlluminateContractsEvents
      collectors:
        - type: classLike
          value: ^Illuminate\\Contracts\\Events\\.*

    # Laravel framework (excludes Illuminate\Contracts\Events\* — allowed in Application layer)
    - name: LaravelFramework
      collectors:
        - type: bool
          must:
            - type: classLike
              value: ^Illuminate\\.*
          must_not:
            - type: classLike
              value: ^Illuminate\\Contracts\\Events\\.*

    # Spatie LaravelData - DTOs
    - name: SpatieData
      collectors:
        - type: classLike
          value: ^Spatie\\LaravelData\\.*

    # Google Ads SDK
    - name: GoogleAdsSdk
      collectors:
        - type: classLike
          value: ^Google\\.*

    # Bing Ads (Microsoft Advertising) SDK
    - name: BingAdsSdk
      collectors:
        - type: classLike
          value: ^Microsoft\\BingAds\\.*

    # HelpScout API SDK
    - name: HelpScoutSdk
      collectors:
        - type: classLike
          value: ^HelpScout\\.*

    # Guzzle HTTP (used by Laravel HTTP client for pool/promise types)
    - name: GuzzleHttp
      collectors:
        - type: classLike
          value: ^GuzzleHttp\\.*

    # Symfony HTTP Foundation
    - name: SymfonyHttp
      collectors:
        - type: classLike
          value: ^Symfony\\Component\\HttpFoundation\\.*

    # Symfony HTTP Kernel (exceptions, etc.)
    - name: SymfonyHttpKernel
      collectors:
        - type: classLike
          value: ^Symfony\\Component\\HttpKernel\\.*

    # Firebase JWT
    - name: FirebaseJwt
      collectors:
        - type: classLike
          value: ^Firebase\\JWT\\.*

    # League Flysystem (filesystem abstraction)
    - name: LeagueFlysystem
      collectors:
        - type: classLike
          value: ^League\\Flysystem\\.*

    # Sentry SDK (error monitoring)
    - name: SentrySdk
      collectors:
        - type: classLike
          value: ^Sentry\\.*

    # Carbon date/time library (Laravel dependency)
    - name: CarbonDateTime
      collectors:
        - type: classLike
          value: ^Carbon\\.*

    # Laravel Horizon (queue monitoring)
    - name: LaravelHorizon
      collectors:
        - type: classLike
          value: ^Laravel\\Horizon\\.*

    # Monolog logging library (Laravel dependency)
    - name: MonologLogging
      collectors:
        - type: classLike
          value: ^Monolog\\.*

    # TheIconic name parser library
    - name: TheIconicNameParser
      collectors:
        - type: classLike
          value: ^TheIconic\\NameParser\\.*

    # libphonenumber phone parsing library
    - name: LibPhoneNumber
      collectors:
        - type: classLike
          value: ^libphonenumber\\.*

  ruleset:
    # Domain: Pure business logic + assertions only
    Domain:
      - AssertionLibrary

    # Application: Domain + PSR interfaces + assertions + can dispatch Jobs
    Application:
      - Domain
      - ApplicationJobs
      - PsrInterfaces
      - IlluminateContractsEvents
      - AssertionLibrary

    # ApplicationJobs: Application + Laravel framework access for queue infrastructure
    ApplicationJobs:
      - Application
      - Domain
      - LaravelFramework
      - CarbonDateTime
      - PsrInterfaces
      - AssertionLibrary
      - SentrySdk

    # Infrastructure: All internal + Laravel, Spatie, Google, Bing, Guzzle, PSR, Flysystem, Assertions, Sentry, Symfony, Carbon, Monolog, Horizon, TheIconic, libphonenumber
    Infrastructure:
      - Application
      - Domain
      - LaravelFramework
      - LaravelHorizon
      - SpatieData
      - GoogleAdsSdk
      - BingAdsSdk
      - HelpScoutSdk
      - GuzzleHttp
      - PsrInterfaces
      - LeagueFlysystem
      - AssertionLibrary
      - SentrySdk
      - SymfonyHttp
      - CarbonDateTime
      - MonologLogging
      - TheIconicNameParser
      - LibPhoneNumber

    # Presentation: Internal + Laravel, Symfony, Firebase, Sentry, Carbon, Spatie (for request DTOs)
    Presentation:
      - Application
      - Domain
      - LaravelFramework
      - SpatieData
      - SymfonyHttp
      - SymfonyHttpKernel
      - FirebaseJwt
      - SentrySdk
      - CarbonDateTime

    # Dev utilities: Same as Presentation + Infrastructure (for testing/debugging commands)
    PresentationDev:
      - Application
      - Domain
      - Infrastructure
      - LaravelFramework
      - SpatieData
      - SymfonyHttp
      - SymfonyHttpKernel
      - FirebaseJwt
      - SentrySdk
      - CarbonDateTime

    # External layers have no outbound dependencies
    AssertionLibrary: ~
    PsrInterfaces: ~
    IlluminateContractsEvents: ~
    LaravelFramework: ~
    SpatieData: ~
    GoogleAdsSdk: ~
    BingAdsSdk: ~
    HelpScoutSdk: ~
    GuzzleHttp: ~
    SymfonyHttp: ~
    SymfonyHttpKernel: ~
    FirebaseJwt: ~
    LeagueFlysystem: ~
    SentrySdk: ~
    CarbonDateTime: ~
    MonologLogging: ~
    TheIconicNameParser: ~
    LaravelHorizon: ~
    LibPhoneNumber: ~
